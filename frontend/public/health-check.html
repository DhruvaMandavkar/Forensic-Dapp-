<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForensicChain - Health Check</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #1a3a5c 0%, #2a5a8c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .health-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.25);
            padding: 2.5rem;
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #1a3a5c; margin-bottom: 2rem; font-size: 1.8rem; }
        .check-item {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0.8rem;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #e8a020;
        }
        .status { font-weight: bold; margin-right: 1rem; width: 100px; }
        .status.pass { color: #27ae60; }
        .status.fail { color: #c0392b; }
        .message { color: #7f8c8d; font-size: 0.9rem; }
        .links {
            margin-top: 2rem;
            border-top: 1px solid #d0d7e0;
            padding-top: 1.5rem;
        }
        .links a {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #1a3a5c;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-right: 1rem;
            margin-bottom: 0.5rem;
        }
        .links a:hover { background: #2a5a8c; }
    </style>
</head>
<body>
    <div class="health-box">
        <h1>⚖️ ForensicChain Health Check</h1>
        
        <div class="check-item">
            <span class="status pass">✓ PASS</span>
            <div class="message">HTML file loaded successfully</div>
        </div>

        <div class="check-item">
            <span class="status" id="env-status">? CHECKING</span>
            <div class="message">Environment variables</div>
        </div>

        <div class="check-item">
            <span class="status" id="app-status">? CHECKING</span>
            <div class="message">React app (http://localhost:3000/)</div>
        </div>

        <div class="links">
            <h3 style="margin-bottom: 1rem; color: #1a3a5c;">Quick Links:</h3>
            <a href="http://localhost:3000/">→ Go to App</a>
            <a href="http://localhost:3000/role-selector">→ Role Selector</a>
            <a href="http://localhost:3000/input-test">→ Input Test</a>
        </div>
    </div>

    <script>
        // Check environment
        fetch('/src/App.jsx').then(r => {
            if (r.ok) {
                document.getElementById('env-status').className = 'status pass';
                document.getElementById('env-status').textContent = '✓ PASS';
            } else {
                document.getElementById('env-status').className = 'status fail';
                document.getElementById('env-status').textContent = '✗ FAIL';
            }
        }).catch(() => {
            document.getElementById('env-status').className = 'status fail';
            document.getElementById('env-status').textContent = '✗ FAIL';
        });

        // Check React app with small delay
        setTimeout(() => {
            fetch('http://localhost:3000/__vite_ping__', { mode: 'no-cors' }).then(() => {
                document.getElementById('app-status').className = 'status pass';
                document.getElementById('app-status').textContent = '✓ PASS';
            }).catch(() => {
                document.getElementById('app-status').className = 'status fail';
                document.getElementById('app-status').textContent = '✗ FAIL';
            });
        }, 500);
    </script>
</body>
</html>
